baseline:
  center_spread: 0.8
  mean_revert_range:
  - 0.2
  - 0.4
  random_walk_step:
  - 0.0005
  - 0.0015
  value_range:
  - -0.3
  - 0.3
chart:
  device:
    ids:
    - DEV_A
    - DEV_B
    - DEV_C
    - DEV_D
    - DEV_E
  item:
    ids:
    - CD1
    - CD2
    - CD3
    - THK1
    - THK2
    - OVL1
    - OVL2
    - DEF1
  step:
    ids:
    - S01
    - S02
    - S03
    - S04
    - S05
context:
  chamber:
    count_range:
    - 4
    - 5
    ids:
    - CH_A
    - CH_B
    - CH_C
    - CH_D
    - CH_E
  columns:
  - eqp_id
  - chamber
  - recipe
  eqp_id:
    count_range:
    - 4
    - 7
    ids:
    - EQP_01
    - EQP_02
    - EQP_03
    - EQP_04
    - EQP_05
    - EQP_06
    - EQP_07
    - EQP_08
  fleet_variation:
    mean_range:
    - 0.0005
    - 0.003
    std_range:
    - 0.003
    - 0.007
  recipe:
    count_range:
    - 4
    - 6
    ids:
    - RCP_X1
    - RCP_X2
    - RCP_X3
    - RCP_X4
    - RCP_X5
    - RCP_X6
  target_deviation:
    mean_min_within_ratio: 2.5
    mean_reference: between
    mean_sigma_range:
    - 3.0
    - 5.0
    min_mean_nsigma: 3.0
    min_std_nsigma: 3.0
    std_min_scale: 1.5
    std_range:
    - 3.0
    - 5.0
    std_reference: within
    std_sigma_range:
    - 3.0
    - 5.0
dataset:
  classes:
  - mean_shift
  - standard_deviation
  - spike
  - drift
  - context
  - normal
  samples_per_class:
    context: 1000
    drift: 1000
    mean_shift: 1000
    normal: 5000
    spike: 1000
    standard_deviation: 1000
  split:
    test: 0.15
    train: 0.7
    val: 0.15
  test_difficulty_scale: 0.8
  val_difficulty_scale: 0.8
  version: v11
defect:
  drift:
    drift_method: index
    max_range_scale: 0.7
    min_max_drift_sigma: 1.5
    region_ratio_range:
    - 0.2
    - 0.375
    slope_sigma_range:
    - 0.5
    - 2.0
    visible_span_ratio_range:
    - 0.12
    - 0.18
    visual_floor_sigma: 2.2
  enforcement:
    context_floor_sigma: 2.5
    drift_floor_sigma: 1.8
    mean_shift_floor_sigma: 1.65
    mean_shift_self_floor_sigma: 1.2
    min_defect_points_range:
    - 12
    - 25
    normal_max_right_dev_sigma: 0.5
    normal_max_right_shift_sigma: 0.5
    spike_floor_sigma: 7.0
    std_floor_ratio: 2.4
  mean_shift:
    difficulty_scale_floor: 0.9
    shift_sigma_range:
    - 1.4
    - 2.1
  region_ratio_range:
  - 0.14
  - 0.3
  spike:
    difficulty_scale_floor: 0.9
    magnitude_sigma_range:
    - 3.2
    - 5.8
    min_magnitude_sigma: 3.2
    min_spikes: 6
    region_ratio_range:
    - 0.12
    - 0.18
    spike_ratio_range:
    - 0.07
    - 0.18
  standard_deviation:
    scale_range:
    - 1.5
    - 2.5
episode:
  count_range:
  - 12
  - 25
  length_range:
  - 20
  - 45
  member_variation:
    event_count_range:
    - 0
    - 3
    event_length_range:
    - 5
    - 25
    event_weights:
      densify: 0.3
      dropout: 0.3
      thin: 0.4
  missing:
    length_range:
    - 8
    - 100
    max_count: 3
  noise:
    correlated:
      rho_range:
      - 0.0
      - 0.2
      sigma_range:
      - 0.003
      - 0.008
    gaussian:
      sigma_range:
      - 0.03
      - 0.065
    laplacian:
      b_range:
      - 0.012
      - 0.03
  region:
    dense:
      density_range:
      - 0.7
      - 1.0
    missing:
      density: 0.0
    sparse:
      density_range:
      - 0.4
      - 0.7
    thin:
      density_range:
      - 0.1
      - 0.2
    very_sparse:
      density_range:
      - 0.2
      - 0.35
  region_weights:
    dense: 0.28
    missing: 0.1
    sparse: 0.32
    thin: 0.12
    very_sparse: 0.18
  time_offset_range:
  - 0
  - 300
image:
  background: white
  baseline_line: true
  dpi: 100
  height: 224
  outlier_sigma: 5
  overlay:
    fleet_alpha: 0.4
    fleet_color: '#B0B0B0'
    fleet_marker_size: 14
    target_alpha: 0.75
    target_color: '#E43320'
    target_marker_size: 16
  title_columns:
  - device
  - step
  - item
  width: 224
  x_label: null
  y_label: Measurement Value (nm)
  fleet_mode: always
output:
  data_dir: data_vd080
  display_dir: display_c01_vd080
  image_dir: images_c01_vd080
seed: 42
