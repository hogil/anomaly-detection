seed: 42
episode:
  count_range:
  - 12
  - 25
  length_range:
  - 20
  - 45
  time_offset_range:
  - 0
  - 300
  missing:
    length_range:
    - 8
    - 100
    max_count: 3
  member_variation:
    event_count_range:
    - 0
    - 3
    event_length_range:
    - 5
    - 25
    event_weights:
      dropout: 0.3
      thin: 0.4
      densify: 0.3
  region_weights:
    dense: 0.28
    sparse: 0.32
    very_sparse: 0.18
    thin: 0.12
    missing: 0.1
  region:
    dense:
      density_range:
      - 0.7
      - 1.0
    sparse:
      density_range:
      - 0.4
      - 0.7
    very_sparse:
      density_range:
      - 0.2
      - 0.35
    thin:
      density_range:
      - 0.1
      - 0.2
    missing:
      density: 0.0
  noise:
    gaussian:
      sigma_range:
      - 0.03
      - 0.065
    laplacian:
      b_range:
      - 0.012
      - 0.03
    correlated:
      rho_range:
      - 0.0
      - 0.2
      sigma_range:
      - 0.003
      - 0.008
baseline:
  value_range:
  - -0.3
  - 0.3
  random_walk_step:
  - 0.0005
  - 0.0015
  mean_revert_range:
  - 0.2
  - 0.4
chart:
  device:
    ids:
    - DEV_A
    - DEV_B
    - DEV_C
    - DEV_D
    - DEV_E
  step:
    ids:
    - S01
    - S02
    - S03
    - S04
    - S05
  item:
    ids:
    - CD1
    - CD2
    - CD3
    - THK1
    - THK2
    - OVL1
    - OVL2
    - DEF1
context:
  columns:
  - eqp_id
  - chamber
  - recipe
  eqp_id:
    ids:
    - EQP_01
    - EQP_02
    - EQP_03
    - EQP_04
    - EQP_05
    - EQP_06
    - EQP_07
    - EQP_08
    count_range:
    - 4
    - 7
  chamber:
    ids:
    - CH_A
    - CH_B
    - CH_C
    - CH_D
    - CH_E
    count_range:
    - 4
    - 5
  recipe:
    ids:
    - RCP_X1
    - RCP_X2
    - RCP_X3
    - RCP_X4
    - RCP_X5
    - RCP_X6
    count_range:
    - 4
    - 6
  fleet_variation:
    mean_range:
    - 0.008
    - 0.02
    std_range:
    - 0.005
    - 0.012
  target_deviation:
    mean_reference: between
    mean_sigma_range:
    - 3.0
    - 5.0
    mean_min_within_ratio: 2.5
    std_reference: within
    std_sigma_range:
    - 3.0
    - 5.0
    std_range:
    - 3.0
    - 5.0
    std_min_scale: 1.5
    min_mean_nsigma: 3.0
    min_std_nsigma: 3.0
defect:
  region_ratio_range:
  - 0.14
  - 0.3
  mean_shift:
    shift_sigma_range:
    - 1.2
    - 2.5
  standard_deviation:
    scale_range:
    - 1.5
    - 2.5
  spike:
    magnitude_sigma_range:
    - 2.5
    - 5.0
    spike_ratio_range:
    - 0.5
    - 1.0
    min_spikes: 8
    min_magnitude_sigma: 2.5
    region_ratio_range:
    - 0.1
    - 0.15
  drift:
    slope_sigma_range:
    - 0.5
    - 2.0
    region_ratio_range:
    - 0.2
    - 0.375
    min_max_drift_sigma: 1.5
    drift_method: index
  enforcement:
    mean_shift_floor_sigma: 1.5
    std_floor_ratio: 2.8
    spike_floor_sigma: 6.0
    drift_floor_sigma: 2.5
    context_floor_sigma: 2.5
    normal_max_right_dev_sigma: 0.5
    normal_max_right_shift_sigma: 0.5
    min_defect_points_range:
    - 12
    - 25
image:
  width: 224
  height: 224
  dpi: 100
  background: white
  outlier_sigma: 5
  overlay:
    fleet_color: '#B0B0B0'
    fleet_alpha: 0.4
    fleet_marker_size: 14
    target_color: '#4878CF'
    target_alpha: 0.75
    target_marker_size: 16
  title_columns:
  - device
  - step
  - item
  x_label: null
  y_label: Measurement Value (nm)
dataset:
  version: v11
  samples_per_class:
    mean_shift: 1000
    standard_deviation: 1000
    spike: 1000
    drift: 1000
    context: 1000
    normal: 5000
  classes:
  - mean_shift
  - standard_deviation
  - spike
  - drift
  - context
  - normal
  split:
    train: 0.7
    val: 0.15
    test: 0.15
  test_difficulty_scale: 0.7
output:
  data_dir: data
  image_dir: images
  display_dir: display
