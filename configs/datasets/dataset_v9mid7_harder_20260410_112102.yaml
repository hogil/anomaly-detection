# =============================================================================
# Semiconductor Metrology Anomaly Detection - Configuration
# =============================================================================
seed: 42

# =============================================================================
# 1. 에피소드 기반 시계열 생성
# =============================================================================
episode:
  count_range: [12, 25]
  length_range: [20, 45]
  time_offset_range: [0, 300]
  missing:
    length_range: [8, 100]       # 결핍 너비 랜덤 (좁은~넓은)
    max_count: 3                 # 결핍 영역 최대 개수
  member_variation:
    event_count_range: [0, 3]    # 멤버별 밀도 이벤트 0~3개
    event_length_range: [5, 25]  # 이벤트 길이
    event_weights:
      dropout: 0.30              # 완전 결핍 (eqp PM)
      thin: 0.40                 # 희소화 (로트 감소)
      densify: 0.30              # 밀집화 (로트 증가)
  region_weights:
    dense: 0.28        # 0.40 → 0.28 (너무 빽빽한 구간 줄임)
    sparse: 0.32       # 0.30 → 0.32
    very_sparse: 0.18  # 0.10 → 0.18 (중간 희소 증가)
    thin: 0.12         # 0.05 → 0.12 (얇은 희소 증가)
    missing: 0.10      # 0.15 → 0.10 (완전 결핍 줄임)
  region:
    dense:
      density_range: [0.70, 1.0]
    sparse:
      density_range: [0.40, 0.70]
    very_sparse:
      density_range: [0.20, 0.35]
    thin:
      density_range: [0.10, 0.20]
    missing:
      density: 0.0
  noise:
    gaussian:
      sigma_range: [0.025, 0.055]   # 난이도 상승 +2 — 기본 노이즈 25% 증가
    laplacian:
      b_range: [0.010, 0.025]       # +25%
    correlated:
      rho_range: [0.0, 0.20]        # 시간 상관성 거의 없음 (영역별 표류 방지)
      sigma_range: [0.003, 0.008]

# =============================================================================
# 2. 베이스라인 신호
# =============================================================================
baseline:
  value_range: [-0.3, 0.3]
  random_walk_step: [0.0005, 0.0015]   # 거의 평탄 — 출렁임 절대 금지
  mean_revert_range: [0.20, 0.40]      # 강한 평균회귀로 즉시 복귀

# =============================================================================
# 3. Chart 정의 (device + step + item = 1 chart)
# =============================================================================
chart:
  device:
    ids: ["DEV_A","DEV_B","DEV_C","DEV_D","DEV_E"]
  step:
    ids: ["S01","S02","S03","S04","S05"]
  item:
    ids: ["CD1","CD2","CD3","THK1","THK2","OVL1","OVL2","DEF1"]

# =============================================================================
# 4. Context 컬럼 (eqp + chamber + recipe = fleet 비교 대상)
#    1 chart당 이미지 수 = eqp종류 + chamber종류 + recipe종류
# =============================================================================
context:
  columns: ["eqp_id", "chamber", "recipe"]
  eqp_id:
    ids: ["EQP_01","EQP_02","EQP_03","EQP_04","EQP_05","EQP_06","EQP_07","EQP_08"]
    count_range: [4, 7]
  chamber:
    ids: ["CH_A","CH_B","CH_C","CH_D","CH_E"]
    count_range: [4, 5]
  recipe:
    ids: ["RCP_X1","RCP_X2","RCP_X3","RCP_X4","RCP_X5","RCP_X6"]
    count_range: [4, 6]
  fleet_variation:
    mean_range: [0.0005, 0.003]   # fleet 멤버 평균 차이 매우 작게 (좁은 band)
    std_range: [0.0005, 0.003]
  target_deviation:
    mean_sigma_range: [3.0, 5.0]  # context: fleet 평균 대비 크게 이탈
    std_range: [2.5, 4.0]          # context: 산포도 크게

# =============================================================================
# 5. 불량 합성 (baseline_std 배수) — 현재와 v8 중간값 (2026-04-09)
# =============================================================================
defect:
  region_ratio_range: [0.14, 0.30]       # mid (현재 [0.12,0.25] / v8 [0.15,0.35])
  mean_shift:
    shift_sigma_range: [1.8, 3.5]        # v9mid7 harder: [2.75,4.25] → [1.8,3.5] (test 0.8× = [1.44, 2.8])
  standard_deviation:
    scale_range: [2.1, 3.2]              # v9mid7 harder: [2.75,3.75] → [2.1,3.2] (test 0.8× = [1.88, 2.76])
  spike:
    magnitude_sigma_range: [5.0, 10.0]   # v9mid7 harder: [6,12] → [5,10] (test 0.8× min = 4.0σ)
    spike_ratio_range: [0.5, 1.0]        # 유지
    min_spikes: 8                        # 유지
    min_magnitude_sigma: 5.0             # harder: 6 → 5 (test 0.8× = 4.0σ 보장)
    region_ratio_range: [0.10, 0.15]     # iter3: [0.02,0.05] → [0.10,0.15]
                                         # iter2 의 [0.02,0.05] 은 시각은 pop 하지만
                                         # 224×224 에서 ~10px 폭 → conv filter 가 못 잡음
                                         # → 모델이 spike 100% 놓침 (FN 13/13 all spike).
                                         # 10~15% = 80~120 points × 50~100% 실제 spike =
                                         # 40~120 개 impulse burst, 모델도 보고 사람도 봄
  drift:
    slope_sigma_range: [0.5, 2.0]        # mid 대역 (현재 [1.0,4.0] / v8 [0.07,0.1])
    region_ratio_range: [0.20, 0.375]    # mid (현재 [0.15,0.40] / v8 [0.25,0.35])
    min_max_drift_sigma: 3.2             # v9mid7 harder: 4.5 → 3.2 (test 0.8× = 2.56σ)
    drift_method: index
  # 사후 검증: defect 주입 후 fleet_std 기준으로 강도 floor 강제
  # (test_difficulty_scale 적용 시 함께 scale됨)
  enforcement:
    mean_shift_floor_sigma: 1.5      # |target_right_mean - fleet_right_mean| / fleet_std
    std_floor_ratio: 2.8             # target_right_std / max(target_left_std, fleet_std)
    spike_floor_sigma: 6.0           # max|target_right - fleet_right_mean| / fleet_std
    drift_floor_sigma: 2.5           # |target_right_end_mean - target_right_start_mean| / fleet_std
    context_floor_sigma: 2.5         # |target_mean - fleet_mean| / fleet_std
    normal_max_right_dev_sigma: 0.5  # normal: |target_right_mean - fleet_right_mean| / fleet_std 의 상한
    normal_max_right_shift_sigma: 0.5  # normal: |target_right_mean - target_left_mean| / fleet_std 의 상한
    min_defect_points_range: [12, 25]  # defect 영역 최소 점 갯수 범위 (sparse 방지)

# =============================================================================
# 6. 이미지 렌더링
# =============================================================================
image:
  width: 224
  height: 224
  dpi: 100
  background: "white"
  # outlier filter: 시각화 시 mean ± N*std 밖의 점 제거 (0 = 비활성)
  outlier_sigma: 5
  overlay:
    fleet_color: "#B0B0B0"
    fleet_alpha: 0.40
    fleet_marker_size: 14
    target_color: "#4878CF"
    target_alpha: 0.75
    target_marker_size: 16
  # display 이미지 제목 구성에 사용할 scenarios.csv 컬럼들 (순서대로 " / "로 연결)
  title_columns: ["device", "step", "item"]
  # display 이미지 x축 라벨 (None이면 timeseries.csv의 x_col 자동 사용)
  x_label: null
  # display 이미지 y축 라벨
  y_label: "Measurement Value (nm)"

# =============================================================================
# 7. 데이터셋
# =============================================================================
dataset:
  # 데이터셋 버전 태그 (configs/datasets/ 스냅샷 파일명에 사용됨)
  version: v9mid7_harder
  # 클래스별 sample 수 (dict 포맷). normal만 5000, 나머지는 1000.
  # 5000개 normal 풀에서 train.py --normal_ratio로 subsample하여 normal 갯수 효과 측정.
  samples_per_class:
    mean_shift: 1000
    standard_deviation: 1000
    spike: 1000
    drift: 1000
    context: 1000
    normal: 5000
  # classes 순서: normal 마지막 (RNG 영향 범위 격리)
  classes: ["mean_shift","standard_deviation","spike","drift","context","normal"]
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  test_difficulty_scale: 0.80

# =============================================================================
# 8. 출력 경로
# =============================================================================
output:
  data_dir: "data"
  image_dir: "images"
  display_dir: "display"
