# Winning training config (2026-04-09 확정)
# 4 critical fixes: LR 2e-5 + aw=1.0 + cudnn.benchmark + tie-fix (strict-only save)
#
# 이 파일의 모든 값은 train.py argparse 의 default 로 사용됨.
# CLI 에서 지정하면 override 됨 (예: --lr_backbone 3e-5).
#
# 사용:
#   python train.py --train_config configs/train/winning.yaml --normal_ratio 700 --seed 42 --log_dir logs/myrun
#
# 참고: --train_config 생략 시 (현재 하위호환) 이 파일이 자동 로드됨 (configs/train/winning.yaml 있으면).

# ---------- data ----------
data_config: dataset.yaml      # project root active dataset config
mode: binary                   # binary / multiclass / anomaly_type
normal_ratio: 0                # 0 = 전체 사용, 700 / 2800 등 지정
max_per_class: 0               # 0 = 전체 사용 (override 시 train 데이터 cap)
num_workers: 4                 # Windows 4, Linux 서버 8-16
prefetch_factor: 4             # DataLoader prefetch_factor

# ---------- model ----------
model_name: convnextv2_tiny.fcmae_ft_in22k_in1k   # 28.3M params
freeze_backbone_epochs: 0      # 0 = 처음부터 전체 학습
dropout: 0.0                   # strong pretrained → dropout 불필요

# ---------- optimizer / LR ----------
lr_backbone: 2.0e-5            # ⭐ winning peak LR (4e-5 이상은 val spike 유발)
lr_head: 2.0e-4                # backbone × 10
weight_decay: 0.01             # AdamW 표준
warmup_epochs: 5               # LinearLR start_factor 0.05, 대칭 언덕
scheduler: cosine              # cosine / step / plateau
step_size: 10                  # scheduler=step 전용
step_gamma: 0.5                # scheduler=step 전용

# ---------- training loop ----------
epochs: 20
batch_size: 32
use_amp: true                  # fp16 default
precision: fp16                # fp16 / bf16 / fp32 (H100/H200 에선 bf16 권장)
compile: false                 # torch.compile (H100/H200)
seed: 42                       # CLI override 가능

# ---------- loss ----------
focal_gamma: 0.0               # 0 = CE (v9 era best)
abnormal_weight: 1.0           # ⭐ 균등. inverse freq 는 spike 유발
label_smoothing: 0.0           # v9 에선 효과 없음
label_weights: ""              # multiclass 전용
ohem_ratio: 0.0                # OHEM 비활성

# ---------- augmentation ----------
use_mixup: false               # overlay 이미지에서 효과 없음
mixup_alpha: 0.2

# ---------- gradient clipping ----------
grad_clip: 1.0                 # default. 0.5 / 2.0 도 test 완료 (sweep 결과 참조)

# ---------- EMA ----------
ema_decay: 0.0                 # 0 = disabled. 유저 방침

# ---------- best selection / early stop ----------
best_update_start_single: 10   # smooth_window<=1
best_update_start_smoothed: 7  # smooth_window>1
early_stop_start: 12           # patience counter 시작
min_epochs: -1                 # -1 = auto (smoothed=7, single=10) [deprecated]
patience: 5                    # tie 연속 patience
smooth_window: 3               # 최근 N epoch 통계
smooth_method: median          # median / mean
val_loss_max_ratio: 2.0        # save guard
val_loss_guard_min_abs: 0.02   # save guard 절대 floor
save_strict_only: true         # ⭐ tie save 금지 (strict > 만)
avg_last_n: 0                  # deprecated
eval_test_every_epoch: false   # 매 epoch test 평가 (history 기록)

# ---------- inference / normal threshold ----------
normal_threshold: 0.9          # selected inference/reporting NT; per-run tuning 금지
